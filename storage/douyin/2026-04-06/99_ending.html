<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>/* 四野指挥部 · 抖音素材公共样式 */
:root {
    --primary: #c0392b;
    --primary-light: #e74c3c;
    --secondary: #2c3e50;
    --bg-dark: #1a1a2e;
    --bg-mid: #16213e;
    --bg-deep: #0f3460;
    --gold: #f39c12;
    --gold-light: #f1c40f;
    --danger: #e74c3c;
    --safe: #27ae60;
    --text-primary: #ecf0f1;
    --text-secondary: #bdc3c7;
    --text-muted: #7f8c8d;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 45%, var(--bg-deep) 100%);
    font-family: "Microsoft YaHei", "SimHei", "PingFang SC", sans-serif;
    color: var(--text-primary);
    position: relative;
}

/* 军事网格背景 */
body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
        linear-gradient(rgba(192,57,43,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,57,43,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
}

body > * { position: relative; z-index: 1; }

/* 标题区 */
.header {
    text-align: center;
    padding: 60px 40px 30px;
}

.header .star {
    font-size: 48px;
    color: var(--primary);
    text-shadow: 0 0 20px rgba(192,57,43,0.5);
}

.header .title {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--text-primary);
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    margin-top: 12px;
}

.header .subtitle {
    font-size: 28px;
    color: var(--text-secondary);
    margin-top: 8px;
    letter-spacing: 2px;
}

/* 分隔线 */
.divider {
    width: 80%;
    margin: 20px auto;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
}

/* 卡片 */
.card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    margin: 16px 40px;
    padding: 24px 28px;
    backdrop-filter: blur(10px);
}

/* 评级徽章 */
.badge {
    display: inline-block;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 22px;
    font-weight: 700;
}
.badge-attack { background: var(--primary); color: white; }
.badge-recon { background: var(--gold); color: #1a1a2e; }
.badge-retreat { background: #7f8c8d; color: white; }

/* 评分条 */
.score-bar-container {
    display: flex;
    align-items: center;
    margin: 6px 0;
}
.score-bar-label {
    width: 100px;
    font-size: 20px;
    color: var(--text-secondary);
}
.score-bar-track {
    flex: 1;
    height: 16px;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
}
.score-bar-fill {
    height: 100%;
    border-radius: 8px;
    transition: width 0.3s;
}
.score-bar-value {
    width: 60px;
    text-align: right;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
}

/* 底部信息 */
.footer {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    color: var(--text-muted);
    font-size: 20px;
}

.footer .brand {
    color: var(--primary);
    font-weight: 700;
    font-size: 24px;
}

/* 排名数字 */
.rank-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 24px;
    font-weight: 900;
}
.rank-1 { background: linear-gradient(135deg, #f39c12, #e67e22); color: #1a1a2e; }
.rank-2 { background: linear-gradient(135deg, #bdc3c7, #95a5a6); color: #1a1a2e; }
.rank-3 { background: linear-gradient(135deg, #e67e22, #d35400); color: white; }
.rank-other { background: rgba(255,255,255,0.1); color: var(--text-secondary); }

/* 雷达图（CSS 实现） */
.radar-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto;
}
.radar-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
}
.radar-shape {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
</style>
<style>
.ending-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 1920px;
    padding: 0 80px;
    text-align: center;
}

.ending-star {
    font-size: 100px;
    margin-bottom: 30px;
    text-shadow: 0 0 50px rgba(192,57,43,0.5);
}

.ending-brand {
    font-size: 64px;
    font-weight: 900;
    color: var(--text-primary);
    letter-spacing: 8px;
    margin-bottom: 16px;
}

.ending-slogan {
    font-size: 32px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 60px;
}

.ending-line {
    width: 300px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    margin-bottom: 60px;
}

.ending-cta {
    font-size: 36px;
    color: var(--text-secondary);
    line-height: 2;
}

.ending-cta strong {
    color: var(--primary-light);
    font-weight: 800;
}

.ending-follow {
    margin-top: 60px;
    padding: 20px 60px;
    border: 2px solid var(--primary);
    border-radius: 50px;
    font-size: 32px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 4px;
}

.ending-disclaimer {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 18px;
    color: var(--text-muted);
    padding: 0 60px;
    line-height: 1.8;
}
</style>
</head>
<body>
<div class="ending-center">
    <div class="ending-star">★</div>
    <div class="ending-brand">林铛Agent</div>
    <div class="ending-slogan">AI 驱动 · 军事化投研</div>
    <div class="ending-line"></div>
    <div class="ending-cta">
        <strong>关注</strong> 获取每日战报<br>
        四野指挥部 · 用AI打赢每一场战役
    </div>
    <div class="ending-follow">+ 关 注</div>
</div>

<div class="ending-disclaimer">
    本内容仅供学习交流，不构成投资建议<br>
    股市有风险，入市需谨慎
</div>
</body>
</html>
